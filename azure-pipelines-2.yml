trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pos_frontend/**
      
pool:
  name: pos_agent

variables:
  node_version: '20.x'

steps:
# 1️⃣ Install Node
- task: NodeTool@0
  inputs:
    versionSpec: '$(node_version)'

# 2️⃣ Install dependencies
- script: |
    cd pos_frontend
    npm install
  displayName: 'Install Angular Dependencies'

# 3️⃣ Install Angular CLI (IMPORTANT FIX)
- script: |
    npm install -g @angular/cli
  displayName: 'Install Angular CLI'

# 3️⃣ Build Angular project
- script: |
    cd pos_frontend
    npx ng build --configuration production
  displayName: 'Build Angular Project'

# 4️⃣ Publish artifact
- publish: pos_frontend/dist/pos_frontend
  artifact: angular_drop
  displayName: 'Publish Angular Build Artifact'