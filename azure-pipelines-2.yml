trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pos_frontend/**

pool:
  name: pos_agent

variables:
  node_version: '20.x'

steps:

# 1️⃣ Install Node (FIXED)
- task: UseNode@1
  inputs:
    version: '$(node_version)'

# 2️⃣ Clean install dependencies (FIXED)
- script: |
    cd pos_frontend

    echo Cleaning old files...
    rmdir /s /q node_modules
    del package-lock.json

    npm cache clean --force

    echo Installing dependencies...
    npm install
  displayName: 'Clean Install Dependencies'

# 3️⃣ Build Angular
- script: |
    cd pos_frontend
    npx ng build --configuration production
  displayName: 'Build Angular'

# 4️⃣ Check dist folder (DEBUG)
- script: |
    cd pos_frontend/dist
    dir
  displayName: 'Check dist output'

# 5️⃣ Deploy to Azure (FIXED 🔥)
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'pos_connection'
    appName: 'retailflow-pos'
    package: 'pos_frontend/dist/*'