trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pos_frontend/**

pool:
  name: pos_agent

variables:
  node_version: '20.x'

steps:

# 1️⃣ Install Node
- task: UseNode@1
  inputs:
    version: '$(node_version)'

# 2️⃣ Install dependencies (FIXED 🔥)
- script: |
    cd pos_frontend
    npm ci
  displayName: 'Install Dependencies'

# 3️⃣ Verify Angular CLI (DEBUG)
- script: |
    cd pos_frontend
    npx ng version
  displayName: 'Check Angular Version'

# 4️⃣ Build Angular
- script: |
    cd pos_frontend
    npx ng build --configuration production
  displayName: 'Build Angular'

# 5️⃣ Check dist output
- script: |
    cd pos_frontend/dist
    dir
  displayName: 'Check dist output'

# 6️⃣ Deploy to Azure
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'pos_connection'
    appName: 'retailflow-pos'
    package: 'pos_frontend/dist/*'