trigger:
- main

pool:
  name: pos_agent

variables:
  buildConfiguration: 'Release'

stages:
- stage: Build
  displayName: 'Build'
  jobs: 
  - job: Buildjob
    displayName: 'Build Job'
    steps:

      # ✅ Correct .NET Version
      - task: UseDotNet@2
        inputs:
          packageType: 'sdk'
          version: '10.x'

      # ✅ Restore
      - script: dotnet restore pos_backend/pos_backend.csproj
        displayName: 'Restore Backend'

      # ✅ Build
      - script: dotnet build pos_backend/pos_backend.csproj --configuration $(buildConfiguration)
        displayName: 'Build Backend'

      # ✅ Publish
      - script: dotnet publish pos_backend/pos_backend.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
        displayName: 'Publish Backend'

      # ✅ Artifact (ONLY ONE)
      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: '$(Build.ArtifactStagingDirectory)'
          artifactName: 'drop'

- stage: Deploy
  displayName: 'Deploy Stage'
  jobs:
    - job: DeployJob
      displayName: 'Deploy Job'
      steps:

        - task: DownloadBuildArtifacts@1
          inputs:
            buildType: 'current'
            downloadType: 'single'
            downloadPath: '$(System.ArtifactsDirectory)'

        # ✅ Correct deployment
        - task: AzureRmWebAppDeployment@5
          inputs:
            ConnectionType: 'AzureRM'
            azureSubscription: 'Azure for Students(3e106156-62e6-4695-a4c9-ab21ab8be451)'
            appType: 'webApp'
            WebAppName: 'pos-web-api'
            package: '$(System.ArtifactsDirectory)/**/*.zip'