trigger:
- main

pool:
  vmImage: 'main'  

variables:
  buildConfiguration: 'Release'

steps:

# Install .NET SDK
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '10.0'

# Restore
- task: DotNetCoreCLI@2
  inputs:
    azureSubscription: 'Azure for Students(3e106156-62e6-4695-a4c9-ab21ab8be451)'
    command: 'build'
- script: dotnet restore pos_backend
  displayName: 'Restore Backend'

# Build
- script: dotnet build pos_backend --configuration $(buildConfiguration)
  displayName: 'Build Backend'

# Publish
- script: dotnet publish pos_backend --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
  displayName: 'Publish Backend'

# Artifact
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'