<section>
    <button
        [type]="type"
        [disabled]="disable"
        class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75 transition duration-200 ease-in-out mt-4 text-[18px]" 
        (click)="onButtonClick()">
        {{ label }}
    </button>
</section>
