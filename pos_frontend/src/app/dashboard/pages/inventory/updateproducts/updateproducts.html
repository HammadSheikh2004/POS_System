<div class="container">
    <div class="row">
        <div class="col-md-12">
            @if(product()){
            <div class="card mt-4">
                <div class="card-header text-center">
                    <h3 class="font-bold text-[30px] py-1">Update Product</h3>
                </div>
                <div class="card-body">
                    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
                        <input type="hidden" formControlName="productId" [value]="product().productId">
                        <div class="mb-3">
                            <label for="productName"
                                class="form-label fw-bold">Product Name</label>
                            <input type="text" class="form-control"
                                id="productName" [value]="product().productName" formControlName="productName" />
                        </div>
                        <div class="mb-3">
                            <label for="sellingPrice"
                                class="form-label fw-bold">Selling Price</label>
                            <input type="text" class="form-control"
                                id="sellingPrice" [value]="product().sellingPrice" formControlName="sellingPrice" />
                        </div>
                        <div class="mb-3">
                            <label for="costPrice"
                                class="form-label fw-bold">Cost Price</label>
                            <input type="text" class="form-control"
                                id="costPrice" [value]="product().costPrice" formControlName="costPrice" />
                        </div>
                        <div class="mb-3">
                            <label for="reorderLevel"
                                class="form-label fw-bold">Reorder Level</label>
                            <input type="text" class="form-control"
                                id="reorderLevel" [value]="product().reorderLevel" formControlName="reorderLevel" />
                        </div>
                        <div class="mb-3">
                            <label for="brand"
                                class="form-label fw-bold">Brand Name</label>
                            <input type="text" class="form-control"
                                id="brand" [value]="product().brand.brandName" formControlName="brandName" />
                        </div>
                        <div class="mb-3">
                            <label for="category"
                                class="form-label fw-bold">Category Name</label>
                            <input type="text" class="form-control"
                                id="category" [value]="product().category.categoryName" formControlName="categoryName" />
                        </div>
                        <div class="mb-3">
                            <label for="unitName"
                                class="form-label fw-bold">Unit Name</label>
                            <input type="text" class="form-control"
                                id="unitName" [value]="product().unit.unitName" formControlName="unitName" />
                        </div>
                        <div class="mb-3">
                            <label for="quantityInStock"
                                class="form-label fw-bold">Quantity In Stock</label>
                            <input type="text" class="form-control"
                                id="quantityInStock" [value]="product().quantityInStock" formControlName="quantityInStock" />
                        </div>
                        <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid">Update
                            Product</button>
                    </form>
                </div>
            </div>
            }
        </div>
    </div>
