<div class="container my-4">
    <div class="row">
        <div class="col-md-12">
            <button type="button" (click)="PrintDailySaleReport()">
                <div class="alert alert-primary" role="alert">
                   Print Daliy Sale Report
                </div>
            </button>
        </div>
    </div>
</div>
<div class="container" id="saleDailyReport">
    <div class="row my-2">
        <div class="col-md-12">
            <app-heading headingTxt="Daily Sale Report" />
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <div class="table-responsive">
                <table class="table text-center">
                    <thead>
                        <tr>
                            <th scope="col">Sale Date</th>
                            <th scope="col">Total Renevue</th>
                        </tr>
                    </thead>
                    <tbody>
                        @if(daliySale().length > 0){
                        @for (item of daliySale(); track $index) {
                        <tr>
                            <td>{{item.saleDay | date:'medium'}}</td>
                            <td>{{item.totalRevenue}}</td>
                        </tr>
                        }
                        }@else {
                        <tr>
                            <td colspan="2">No Daliy Sale Report</td>
                        </tr>
                        }

                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
